<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚑 きゅうきゅうしゃ カウントゲーム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 60%, #A5D6A7 60%, #81C784 100%);
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-area {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* ヘッダー */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    #header h1 {
      font-size: 24px;
      color: #E53935;
    }

    #score-display {
      font-size: 28px;
      font-weight: bold;
      color: #E53935;
    }

    #question {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: #FFF9C4;
      border: 3px solid #FBC02D;
      border-radius: 20px;
      padding: 12px 32px;
      font-size: 28px;
      font-weight: bold;
      color: #F57F17;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      text-align: center;
    }

    /* 救急車 */
    .ambulance {
      position: absolute;
      cursor: pointer;
      transition: transform 0.1s;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
      z-index: 10;
    }

    .ambulance:hover {
      transform: scale(1.1);
    }

    .ambulance:active {
      transform: scale(0.95);
    }

    .ambulance.clicked {
      animation: pop 0.4s ease-out forwards;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      30% { transform: scale(1.3); }
      100% { transform: scale(0); opacity: 0; }
    }

    /* カウント表示 */
    .count-popup {
      position: fixed;
      z-index: 200;
      font-size: 64px;
      font-weight: bold;
      color: #E53935;
      text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
    }

    @keyframes floatUp {
      0% { transform: scale(0.5); opacity: 1; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: translateY(-60px) scale(1); opacity: 0; }
    }

    /* クリアメッセージ */
    #clear-message {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 300;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    #clear-message.show {
      display: flex;
    }

    #clear-box {
      background: white;
      border-radius: 30px;
      padding: 40px 60px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: bounceIn 0.5s ease-out;
    }

    @keyframes bounceIn {
      0% { transform: scale(0); }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #clear-box h2 {
      font-size: 48px;
      color: #E53935;
      margin-bottom: 12px;
    }

    #clear-box p {
      font-size: 24px;
      color: #666;
      margin-bottom: 24px;
    }

    #next-btn, #restart-btn {
      background: #E53935;
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px 48px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(229,57,53,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #next-btn:hover, #restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(229,57,53,0.5);
    }

    /* ゴール画面 */
    #goal-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 400;
      background: linear-gradient(135deg, #FFF9C4, #FFECB3, #FFE0B2);
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #goal-screen.show {
      display: flex;
    }

    #goal-screen h1 {
      font-size: 56px;
      color: #E53935;
      margin-bottom: 8px;
      animation: bounceIn 0.6s ease-out;
    }

    #goal-screen .trophy {
      font-size: 120px;
      animation: bounceIn 0.8s ease-out;
    }

    #goal-screen .goal-stars {
      font-size: 36px;
      color: #F57F17;
      margin: 16px 0;
    }

    #goal-screen .goal-msg {
      font-size: 28px;
      color: #666;
      margin-bottom: 32px;
    }

    /* 進捗バー */
    #progress-bar {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      display: flex;
      gap: 8px;
    }

    .progress-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      border: 2px solid #E53935;
      transition: background 0.3s;
    }

    .progress-dot.done {
      background: #E53935;
    }

    .progress-dot.current {
      background: #FFCDD2;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    /* 道路 */
    .road {
      position: absolute;
      bottom: 38%;
      left: 0;
      right: 0;
      height: 40px;
      background: #757575;
      z-index: 1;
    }

    .road::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: repeating-linear-gradient(90deg, #FFF 0, #FFF 30px, transparent 30px, transparent 60px);
      transform: translateY(-50%);
    }

    /* 雲 */
    .cloud {
      position: absolute;
      z-index: 0;
      font-size: 48px;
      opacity: 0.6;
      animation: drift linear infinite;
    }

    @keyframes drift {
      from { transform: translateX(-100px); }
      to { transform: translateX(calc(100vw + 100px)); }
    }

    /* レベル表示 */
    #level-display {
      font-size: 18px;
      color: #666;
    }

    /* 星 */
    .star {
      display: inline-block;
      animation: starSpin 0.6s ease-out;
    }

    @keyframes starSpin {
      0% { transform: scale(0) rotate(0deg); }
      100% { transform: scale(1) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="game-area">
    <div id="header">
      <h1>🚑 きゅうきゅうしゃゲーム</h1>
      <div>
        <span id="level-display">レベル 1</span>
        <span id="score-display">⭐ 0</span>
      </div>
    </div>

    <div id="question">きゅうきゅうしゃを <span id="target-count">0</span> だい タッチしよう！</div>

    <div class="road"></div>

    <div id="ambulances"></div>

    <div id="progress-bar"></div>

    <div id="clear-message">
      <div id="clear-box">
        <h2 id="clear-text">🎉 すごい！</h2>
        <p id="clear-sub"></p>
        <button id="next-btn" onclick="nextRound()">つぎへ ▶</button>
      </div>
    </div>

    <div id="goal-screen">
      <div class="trophy">🏆</div>
      <h1>ゴール！！</h1>
      <div class="goal-stars" id="goal-stars"></div>
      <div class="goal-msg" id="goal-msg"></div>
      <button id="restart-btn" onclick="restartGame()">もういっかい あそぶ 🚑</button>
    </div>
  </div>

  <script>
    // ゲーム状態
    const MAX_LEVEL = 5;
    let level = 1;
    let score = 0;
    let targetCount = 0;
    let clickedCount = 0;
    let ambulanceData = [];

    // 救急車SVGを生成
    function createAmbulanceSVG(size) {
      return `<svg width="${size}" height="${size * 0.6}" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
        <!-- 車体 -->
        <rect x="10" y="30" width="180" height="60" rx="10" fill="#FFFFFF" stroke="#E53935" stroke-width="3"/>
        <!-- 赤いライン -->
        <rect x="10" y="55" width="180" height="12" fill="#E53935" opacity="0.9"/>
        <!-- 十字マーク -->
        <rect x="85" y="35" width="30" height="8" rx="2" fill="#E53935"/>
        <rect x="96" y="28" width="8" height="22" rx="2" fill="#E53935"/>
        <!-- 窓 -->
        <rect x="140" y="36" width="40" height="16" rx="4" fill="#B3E5FC" stroke="#0288D1" stroke-width="1.5"/>
        <rect x="20" y="36" width="30" height="16" rx="4" fill="#B3E5FC" stroke="#0288D1" stroke-width="1.5"/>
        <!-- サイレン -->
        <rect x="80" y="18" width="16" height="14" rx="4" fill="#F44336">
          <animate attributeName="fill" values="#F44336;#2196F3;#F44336" dur="0.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="104" y="18" width="16" height="14" rx="4" fill="#2196F3">
          <animate attributeName="fill" values="#2196F3;#F44336;#2196F3" dur="0.6s" repeatCount="indefinite"/>
        </rect>
        <!-- タイヤ -->
        <circle cx="50" cy="92" r="14" fill="#424242"/>
        <circle cx="50" cy="92" r="6" fill="#9E9E9E"/>
        <circle cx="150" cy="92" r="14" fill="#424242"/>
        <circle cx="150" cy="92" r="6" fill="#9E9E9E"/>
        <!-- ヘッドライト -->
        <rect x="185" y="50" width="8" height="10" rx="3" fill="#FFEB3B"/>
      </svg>`;
    }

    // おとり車SVGを生成（消防車）
    function createFireTruckSVG(size) {
      return `<svg width="${size}" height="${size * 0.6}" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="30" width="180" height="60" rx="10" fill="#E53935" stroke="#B71C1C" stroke-width="3"/>
        <rect x="140" y="36" width="40" height="16" rx="4" fill="#FFCDD2" stroke="#B71C1C" stroke-width="1.5"/>
        <rect x="20" y="36" width="30" height="16" rx="4" fill="#FFCDD2" stroke="#B71C1C" stroke-width="1.5"/>
        <!-- はしご -->
        <rect x="30" y="20" width="120" height="6" rx="2" fill="#FFB300"/>
        <rect x="40" y="14" width="4" height="18" fill="#FFB300"/>
        <rect x="80" y="14" width="4" height="18" fill="#FFB300"/>
        <rect x="120" y="14" width="4" height="18" fill="#FFB300"/>
        <circle cx="50" cy="92" r="14" fill="#424242"/>
        <circle cx="50" cy="92" r="6" fill="#9E9E9E"/>
        <circle cx="150" cy="92" r="14" fill="#424242"/>
        <circle cx="150" cy="92" r="6" fill="#9E9E9E"/>
      </svg>`;
    }

    // おとり車SVGを生成（パトカー）
    function createPoliceSVG(size) {
      return `<svg width="${size}" height="${size * 0.6}" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="30" width="180" height="60" rx="10" fill="#FFFFFF" stroke="#1565C0" stroke-width="3"/>
        <rect x="10" y="55" width="180" height="12" fill="#1565C0" opacity="0.9"/>
        <rect x="140" y="36" width="40" height="16" rx="4" fill="#B3E5FC" stroke="#0288D1" stroke-width="1.5"/>
        <rect x="20" y="36" width="30" height="16" rx="4" fill="#B3E5FC" stroke="#0288D1" stroke-width="1.5"/>
        <!-- パトランプ -->
        <rect x="85" y="18" width="30" height="12" rx="4" fill="#F44336">
          <animate attributeName="fill" values="#F44336;#2196F3;#F44336" dur="0.5s" repeatCount="indefinite"/>
        </rect>
        <circle cx="50" cy="92" r="14" fill="#424242"/>
        <circle cx="50" cy="92" r="6" fill="#9E9E9E"/>
        <circle cx="150" cy="92" r="14" fill="#424242"/>
        <circle cx="150" cy="92" r="6" fill="#9E9E9E"/>
      </svg>`;
    }

    // ランダム位置を重なりなしで生成
    function getRandomPositions(count, sizeW, sizeH) {
      const positions = [];
      const padding = 20;
      const headerHeight = 140;
      const maxW = window.innerWidth - sizeW - padding;
      const maxH = window.innerHeight - sizeH - padding;
      let attempts = 0;

      while (positions.length < count && attempts < 500) {
        const x = padding + Math.random() * (maxW - padding);
        const y = headerHeight + Math.random() * (maxH - headerHeight);
        const overlap = positions.some(p =>
          Math.abs(p.x - x) < sizeW + 10 && Math.abs(p.y - y) < sizeH + 10
        );
        if (!overlap) {
          positions.push({ x, y });
        }
        attempts++;
      }
      return positions;
    }

    // 雲を生成
    function createClouds() {
      for (let i = 0; i < 4; i++) {
        const cloud = document.createElement('div');
        cloud.className = 'cloud';
        cloud.textContent = '☁️';
        cloud.style.top = (5 + Math.random() * 20) + '%';
        cloud.style.fontSize = (36 + Math.random() * 40) + 'px';
        cloud.style.animationDuration = (15 + Math.random() * 20) + 's';
        cloud.style.animationDelay = (-Math.random() * 20) + 's';
        document.getElementById('game-area').appendChild(cloud);
      }
    }

    // 声で「きゅうきゅうしゃ！」と読み上げ
    let jaVoice = null;

    function speakChildVoice() {
      try {
        if (!('speechSynthesis' in window)) return;
        const utter = new SpeechSynthesisUtterance('きゅうきゅうしゃ！');
        utter.lang = 'ja-JP';
        utter.pitch = 1.8;
        utter.rate = 1.2;
        utter.volume = 1.0;
        if (jaVoice) utter.voice = jaVoice;
        speechSynthesis.speak(utter);
      } catch (e) {}
    }

    // 声を事前に読み込み（iPadで必要）
    function loadVoices() {
      const voices = speechSynthesis.getVoices();
      jaVoice = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    }
    if ('speechSynthesis' in window) {
      loadVoices();
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    // タップ時の音声
    function playSiren() {
      speakChildVoice();
    }

    // クリア音
    function playClearSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523, 659, 784, 1047].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.12);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.12 + 0.3);
          osc.start(ctx.currentTime + i * 0.12);
          osc.stop(ctx.currentTime + i * 0.12 + 0.3);
        });
      } catch (e) {}
    }

    // ブッブー音
    function playWrongSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 200;
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      } catch (e) {}
    }

    // 救急車クリック
    function onAmbulanceClick(el, index) {
      if (el.classList.contains('clicked')) return;
      el.classList.add('clicked');
      clickedCount++;
      playSiren();

      // カウント表示
      const popup = document.createElement('div');
      popup.className = 'count-popup';
      popup.textContent = clickedCount;
      const rect = el.getBoundingClientRect();
      popup.style.left = (rect.left + rect.width / 2 - 20) + 'px';
      popup.style.top = (rect.top - 10) + 'px';
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 800);

      // クリアチェック
      if (clickedCount >= targetCount) {
        setTimeout(() => showClear(), 500);
      }
    }

    // おとり車クリック
    function onDecoyClick(el) {
      playWrongSound();
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'shake 0.4s ease';
      setTimeout(() => el.style.animation = '', 400);
    }

    // シェイクアニメーション追加
    const style = document.createElement('style');
    style.textContent = `@keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }`;
    document.head.appendChild(style);

    // ラウンド開始
    function startRound() {
      clickedCount = 0;
      const container = document.getElementById('ambulances');
      container.innerHTML = '';

      // レベルに応じた設定
      targetCount = Math.min(level + 1, 8);
      const decoyCount = Math.max(0, Math.floor(level / 2));
      const totalCount = targetCount + decoyCount;
      const size = Math.max(100, 140 - level * 5);

      document.getElementById('target-count').textContent = targetCount;
      document.getElementById('level-display').textContent = 'レベル ' + level;

      const positions = getRandomPositions(totalCount, size, size * 0.6);

      // 車を配置
      const vehicles = [];
      for (let i = 0; i < targetCount; i++) vehicles.push('ambulance');
      for (let i = 0; i < decoyCount; i++) vehicles.push(Math.random() > 0.5 ? 'firetruck' : 'police');

      // シャッフル
      for (let i = vehicles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [vehicles[i], vehicles[j]] = [vehicles[j], vehicles[i]];
      }

      vehicles.forEach((type, i) => {
        if (i >= positions.length) return;
        const el = document.createElement('div');
        el.className = 'ambulance';
        el.style.left = positions[i].x + 'px';
        el.style.top = positions[i].y + 'px';

        if (type === 'ambulance') {
          el.innerHTML = createAmbulanceSVG(size);
          el.onclick = () => onAmbulanceClick(el, i);
        } else if (type === 'firetruck') {
          el.innerHTML = createFireTruckSVG(size);
          el.onclick = () => onDecoyClick(el);
        } else {
          el.innerHTML = createPoliceSVG(size);
          el.onclick = () => onDecoyClick(el);
        }

        container.appendChild(el);
      });
    }

    // 進捗バー更新
    function updateProgress() {
      const bar = document.getElementById('progress-bar');
      bar.innerHTML = '';
      for (let i = 1; i <= MAX_LEVEL; i++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        if (i < level) dot.classList.add('done');
        if (i === level) dot.classList.add('current');
        bar.appendChild(dot);
      }
    }

    // クリア表示
    function showClear() {
      playClearSound();
      score += targetCount;
      document.getElementById('score-display').textContent = '⭐ ' + score;

      // 進捗バー更新（現在レベルをdoneに）
      const dots = document.querySelectorAll('.progress-dot');
      if (dots[level - 1]) {
        dots[level - 1].classList.remove('current');
        dots[level - 1].classList.add('done');
      }

      if (level >= MAX_LEVEL) {
        // 全ステージクリア → ゴール画面
        setTimeout(() => showGoal(), 600);
        return;
      }

      const messages = ['🎉 すごい！', '👏 やったね！', '🌟 かっこいい！', '🚑 さすが！', '✨ てんさい！'];
      document.getElementById('clear-text').textContent = messages[Math.floor(Math.random() * messages.length)];
      document.getElementById('clear-sub').textContent =
        targetCount + 'だい みつけたよ！ ' + '⭐'.repeat(Math.min(targetCount, 5));

      document.getElementById('clear-message').classList.add('show');
    }

    // ゴール画面
    function showGoal() {
      document.getElementById('clear-message').classList.remove('show');
      document.getElementById('goal-stars').textContent = '⭐'.repeat(Math.min(score, 20)) + ' ' + score + 'てん';
      document.getElementById('goal-msg').textContent = 'ぜんぶ クリアしたよ！すごいね！';
      document.getElementById('goal-screen').classList.add('show');

      // 紙吹雪エフェクト
      launchConfetti();
    }

    // 紙吹雪
    function launchConfetti() {
      const colors = ['#E53935', '#FDD835', '#43A047', '#1E88E5', '#FF8F00', '#E91E63'];
      for (let i = 0; i < 60; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.style.cssText = `
            position:fixed; z-index:500; width:12px; height:12px;
            background:${colors[Math.floor(Math.random() * colors.length)]};
            border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
            left:${Math.random() * 100}vw; top:-20px;
            pointer-events:none;
            animation: confettiFall ${2 + Math.random() * 2}s ease-in forwards;
          `;
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 4000);
        }, i * 50);
      }
    }

    // 紙吹雪アニメーション
    const confettiStyle = document.createElement('style');
    confettiStyle.textContent = `@keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity:1; }
      100% { transform: translateY(100vh) rotate(${360 + Math.random()*360}deg); opacity:0; }
    }`;
    document.head.appendChild(confettiStyle);

    // 次のラウンド
    function nextRound() {
      document.getElementById('clear-message').classList.remove('show');
      level++;
      updateProgress();
      startRound();
    }

    // 最初からやり直し
    function restartGame() {
      document.getElementById('goal-screen').classList.remove('show');
      level = 1;
      score = 0;
      document.getElementById('score-display').textContent = '⭐ 0';
      updateProgress();
      startRound();
    }

    // 初期化
    createClouds();
    updateProgress();
    startRound();
  </script>
</body>
</html>
